version: 2

models:
  - name: dim_locations
    description: ""
    columns:
      - name: location_id
        data_type: integer
        description: ""

      - name: borough
        data_type: varchar
        description: ""

      - name: zone
        data_type: varchar
        description: ""

      - name: service_zone
        data_type: varchar
        description: ""

  - name: dim_vendors
    description: ""
    columns:
      - name: vendor_id
        data_type: integer
        description: "A unique ID for each vendor"
        data_tests:
          - unique
          - not_null

      - name: vendor_name
        data_type: varchar
        description: "the name of a vendor"
        data_tests:
          - not_null

  - name: fct_trips
    description: "the fact table of NYC taxi trips."
    columns:
      - name: trip_id
        data_type: md5 varchar
        description: ""
        data_tests:
          - unique
          - not_null

      - name: vendor_id
        data_type: integer
        description: ""
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_vendors')
                field: vendor_id
          - accepted_values:
              arguments:
                values: [1, 2, 6, 7]

      - name: taxi_type
        data_type: varchar
        description: ""

      - name: rate_code_id
        data_type: integer
        description: ""

      - name: pickup_location_id
        data_type: integer
        description: ""

      - name: pickup_borough
        data_type: varchar
        description: ""

      - name: pickup_zone
        data_type: varchar
        description: ""

      - name: dropoff_location_id
        data_type: integer
        description: ""

      - name: dropoff_borough
        data_type: varchar
        description: ""

      - name: dropoff_zone
        data_type: varchar
        description: ""

      - name: pickup_datetime
        data_type: timestamp
        description: ""

      - name: dropoff_datetime
        data_type: timestamp
        description: ""

      - name: store_and_fwd_flag
        data_type: varchar
        description: ""

      - name: passenger_count
        data_type: integer
        description: ""

      - name: trip_distance
        data_type: decimal(18,3)
        description: ""

      - name: trip_type
        data_type: integer
        description: ""

      - name: trip_duration_minutes
        data_type: bigint
        description: ""

      - name: fare_amount
        data_type: decimal(18,3)
        description: ""
        data_tests:
          - not_null

      - name: extra
        data_type: decimal(18,3)
        description: ""

      - name: mta_tax
        data_type: decimal(18,3)
        description: ""

      - name: tip_amount
        data_type: decimal(18,3)
        description: ""

      - name: tolls_amount
        data_type: decimal(18,3)
        description: ""

      - name: ehail_fee
        data_type: decimal(18,3)
        description: ""

      - name: improvement_surcharge
        data_type: decimal(18,3)
        description: ""

      - name: total_amount
        data_type: decimal(18,3)
        description: ""

      - name: payment_type
        data_type: integer
        description: ""

      - name: payment_type_description
        data_type: varchar
        description: ""

  - name: monthly_day_type_avg
    description: ""
    columns:
      - name: vendor_name
        data_type: varchar
        description: ""

      - name: taxi_type
        data_type: varchar
        description: ""

      - name: pickup_month
        data_type: date
        description: ""

      - name: avg_monthly_weekend_fare
        data_type: double
        description: ""

      - name: avg_monthly_workday_fare
        data_type: double
        description: ""

      - name: avg_monthly_weekend_total
        data_type: double
        description: ""

      - name: avg_monthly_workday_total
        data_type: double
        description: ""

      - name: avg_monthly_weekend_fare_ratio
        data_type: double
        description: ""

      - name: avg_monthly_workday_fare_ratio
        data_type: double
        description: ""
        
  - name: monthly_revenue_per_location
    description: ""
    columns:
      - name: pickup_zone
        data_type: varchar
        description: ""

      - name: revenue_month
        data_type: timestamp
        description: ""

      - name: taxi_type
        data_type: varchar
        description: ""

      - name: revenue_monthly_fare
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_extra
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_mta_tax
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_tip_amount
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_tolls_amount
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_ehail_fee
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_improvement_surcharge
        data_type: decimal(38,3)
        description: ""

      - name: revenue_monthly_total_amount
        data_type: decimal(38,3)
        description: ""

      - name: total_monthly_trips
        data_type: bigint
        description: ""

      - name: avg_monthly_passenger_count
        data_type: double
        description: ""

      - name: avg_monthly_trip_distance
        data_type: double
        description: ""

