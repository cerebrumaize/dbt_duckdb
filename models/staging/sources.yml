version: 2

sources:
  - name: raw_data
    description: "Raw data sources for NYC taxi rides"
    database: taxi_rides_ny # project name in dbt_project.yml if local duckdb else project ID if using Google bigquery
    schema: prod
    tables:
      - name: yellow_tripdata
        description: cab can be street hailed and pre-arranged anywhere in NYC.
        colmns:
          - name: VendorID
            description: |
              which taxi company this one is working on
                1: 'Creative Mobile Technologies'
                2: 'VeriFone Inc.'
                4: 'Unknown/Other'
            data_type: int
            meta:
              pii: false
              ownership: data_team
              importance: high
              formatting: 10-digits
      - name: green_tripdata


